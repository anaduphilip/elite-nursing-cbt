<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const reference = urlParams.get('reference') || urlParams.get('tx_ref');
        if (reference) {
            window.location.replace('elitenursing://payment?reference=' + reference);
        }
    </script>
</head>
<body></body>
</html>
