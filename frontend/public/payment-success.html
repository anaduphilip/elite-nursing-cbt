<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const reference = urlParams.get('reference') || urlParams.get('tx_ref');
        const transactionId = urlParams.get('transaction_id') || urlParams.get('id');
        if (reference) {
            let redirectUrl = 'elitenursing://payment?reference=' + encodeURIComponent(reference);
            if (transactionId) {
                redirectUrl += '&transactionId=' + encodeURIComponent(transactionId);
            }
            window.location.replace(redirectUrl);
        }
    </script>
</head>
<body></body>
</html>
